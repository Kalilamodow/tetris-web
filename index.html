<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris</title>
  </head>

  <body>
    <div id="home">
      <h1>Tetris</h1>
      <button type="button" id="play-btn">Play</button>
    </div>

    <div id="game" hidden>
      <canvas id="canvas" width="300" height="600"></canvas>
      <div id="controls">
        <button id="left-btn">Go Left</button>
        <button id="turn-left-btn">Rotate Left</button>
        <button id="turn-right-btn">Rotate Right</button>
        <button id="right-btn">Go Right</button>
        <button id="down-btn">Down</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
